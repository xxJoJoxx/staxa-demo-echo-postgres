{{define "edit"}}
{{template "layout" .}}
{{end}}

{{define "content"}}
<h2>Edit Contact</h2>
<form method="POST" action="/contacts/{{.Contact.ID}}">
    <div class="form-group">
        <label for="name">Name *</label>
        <input type="text" id="name" name="name" value="{{.Contact.Name}}" required>
        {{if .Errors.Name}}<span class="error">{{.Errors.Name}}</span>{{end}}
    </div>
    <div class="form-group">
        <label for="email">Email *</label>
        <input type="email" id="email" name="email" value="{{.Contact.Email}}" required>
        {{if .Errors.Email}}<span class="error">{{.Errors.Email}}</span>{{end}}
    </div>
    <div class="form-group">
        <label for="phone">Phone</label>
        <input type="text" id="phone" name="phone" value="{{.Contact.Phone}}">
    </div>
    <div class="form-group">
        <label for="notes">Notes</label>
        <textarea id="notes" name="notes" rows="4">{{.Contact.Notes}}</textarea>
    </div>
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Update Contact</button>
        <a href="/contacts/{{.Contact.ID}}" class="btn">Cancel</a>
    </div>
</form>
{{end}}
