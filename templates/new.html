{{define "new"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Manager</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="/">Contact Manager</a></h1>
        </header>
        <main>
            <h2>New Contact</h2>
            <form method="POST" action="/contacts">
                <div class="form-group">
                    <label for="name">Name *</label>
                    <input type="text" id="name" name="name" value="{{.Contact.Name}}" required>
                    {{if .Errors.Name}}<span class="error">{{.Errors.Name}}</span>{{end}}
                </div>
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" value="{{.Contact.Email}}" required>
                    {{if .Errors.Email}}<span class="error">{{.Errors.Email}}</span>{{end}}
                </div>
                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="text" id="phone" name="phone" value="{{.Contact.Phone}}">
                </div>
                <div class="form-group">
                    <label for="notes">Notes</label>
                    <textarea id="notes" name="notes" rows="4">{{.Contact.Notes}}</textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Create Contact</button>
                    <a href="/" class="btn">Cancel</a>
                </div>
            </form>
        </main>
    </div>
</body>
</html>
{{end}}
